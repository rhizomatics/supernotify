name: PR assignment

on:
    pull_request:
        types: [opened, edited, synchronize, reopened]

jobs:
    auto-assign:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            issues: write
        steps:
            - name: 'Auto-assign PR'
              uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  assignees: jeyrb
                  numOfAssignee: 1
                  allowSelfAssign: true
