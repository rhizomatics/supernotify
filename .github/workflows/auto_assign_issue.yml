name: Issue assignment

on:
    issues:
        types: [opened]

jobs:
    auto-assign:
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - name: 'Auto-assign issue'
              uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226
              with:
                  assignees: jeyrb
                  numOfAssignee: 1
                  allowSelfAssign: true
                  repo-token: ${{ secrets.GITHUB_TOKEN  }}
