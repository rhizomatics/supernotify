name: Manage labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Run Labeler
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d
        with:
          skip-delete: true
